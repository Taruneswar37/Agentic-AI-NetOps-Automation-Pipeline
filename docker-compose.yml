# ═══════════════════════════════════════════════════════════
# Agentic NetOps — Docker Compose for Ansible AWX
# ═══════════════════════════════════════════════════════════
# Usage:
#   docker-compose up -d
#   Access AWX at http://localhost:8052
# ═══════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:15
    container_name: awx-postgres
    environment:
      POSTGRES_USER: awx
      POSTGRES_PASSWORD: awxpass
      POSTGRES_DB: awx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awx"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: awx-redis
    networks:
      - awx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AWX Web (API + UI) ──
  awx_web:
    image: quay.io/ansible/awx:24.0.0
    container_name: awx-web
    hostname: awxweb
    ports:
      - "8052:8052"
    environment:
      DATABASE_USER: awx
      DATABASE_PASSWORD: awxpass
      DATABASE_NAME: awx
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AWX_ADMIN_USER: admin
      AWX_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - awx_projects:/var/lib/awx/projects
    networks:
      - awx-network

  # ── AWX Task Runner ──
  awx_task:
    image: quay.io/ansible/awx:24.0.0
    container_name: awx-task
    hostname: awxtask
    command: launch_awx_task.sh
    environment:
      DATABASE_USER: awx
      DATABASE_PASSWORD: awxpass
      DATABASE_NAME: awx
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SUPERVISOR_WEB_CONFIG_PATH: /etc/supervisord.conf
    depends_on:
      - awx_web
    volumes:
      - awx_projects:/var/lib/awx/projects
    networks:
      - awx-network

volumes:
  postgres_data:
  awx_projects:

networks:
  awx-network:
    driver: bridge
